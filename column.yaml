operator_defaults:
  ma_nguoi_xuat_khau: prefix       # MST — cover cả 10 và 13 số
  ma_nguoi_nhap_khau: prefix
  ma_so_hang_hoa: prefix           # HS code — user hay tra theo nhóm
  mo_ta_hang_hoa: contains
  ten_nguoi_xuat_khau: contains
